<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>My Dai Di Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff87; --red: #ff4d6d; --gold: #ffd166; --bg: #0a0a0f;
    --surface: #13131a; --surface2: #1c1c28; --border: rgba(255,255,255,0.07);
    --text: #f0f0f0; --muted: #666680; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }
  #app { position: relative; z-index: 1; padding: 16px; max-width: 480px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; background: linear-gradient(135deg, var(--gold), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo span { font-size: 12px; display: block; font-family: 'DM Mono', monospace; color: var(--muted); -webkit-text-fill-color: var(--muted); letter-spacing: 0; }
  .screen { display: none; animation: fadeUp 0.25s ease; }
  .screen.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .player-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .player-row:last-child { border-bottom: none; }
  .player-name { font-size: 14px; }
  .player-amount { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
  .pos { color: var(--green); } .neg { color: var(--red); } .zero { color: var(--muted); }
  .input-group { margin-bottom: 14px; }
  .input-group label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; }
  .input-group input, .input-group select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-family: 'DM Mono', monospace; outline: none; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; margin-top: 4px; }
  .btn-primary { background: var(--green); color: #000; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-gold { background: var(--gold); color: #000; }
  .nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 20px; }
  .nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 10px; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .nav-btn.active { border-color: var(--green); color: var(--green); }
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .choice-btn { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px 10px; text-align: center; color: var(--muted); }
  .choice-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(255,209,102,0.08); }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface2); padding: 10px 20px; border-radius: 100px; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 99; }
  #toast.show { opacity: 1; }
  .card-input-row { display: grid; grid-template-columns: 1fr 80px; align-items: center; gap: 10px; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">DAI DI<span>Personal Tracker 👤</span></div>
  </div>

  <div class="screen active" id="screen-setup">
    <div class="label">New Game</div>
    <div class="card">
      <div class="input-group">
        <label>YOUR NAME</label>
        <input type="text" id="my-name" placeholder="Me" maxlength="12">
      </div>
      <div class="input-group">
        <label>OPPONENTS (Comma separated)</label>
        <input type="text" id="opponent-names" placeholder="Jerica, Aloysius, Bob">
      </div>
    </div>
    <button class="btn btn-primary" onclick="startGame()">INITIALIZE TRACKER</button>
  </div>

  <div class="screen" id="screen-main">
    <div class="nav">
      <button class="nav-btn active" onclick="showTab('tab-scores')" id="nav-scores">📊 Scores</button>
      <button class="nav-btn" onclick="showTab('tab-round')" id="nav-round">🃏 Round</button>
      <button class="nav-btn" onclick="showTab('tab-special')" id="nav-special">💸 Special</button>
      <button class="nav-btn" onclick="showTab('tab-debt')" id="nav-debt">🤝 Debt</button>
    </div>

    <div id="tab-scores">
      <div class="label">My Balance vs Others</div>
      <div class="card" id="scoreboard"></div>
      <button class="btn btn-danger" style="margin-top:20px" onclick="endGame()">RESET GAME</button>
    </div>

    <div id="tab-round" style="display:none">
      <div class="label">Input Card Counts</div>
      <div class="card" id="card-inputs-container"></div>
      <button class="btn btn-primary" onclick="tabulate()">CALCULATE MY P&L</button>
    </div>

    <div id="tab-special" style="display:none">
      <div class="label">Money Come</div>
      <div class="card">
        <div class="choice-grid">
          <div class="choice-btn selected" id="choice-1" onclick="selectMoney(1)">4OAK ($1)</div>
          <div class="choice-btn" id="choice-2" onclick="selectMoney(2)">SF ($2)</div>
        </div>
        <div class="input-group">
          <label>WHO GOT IT?</label>
          <select id="money-who"></select>
        </div>
      </div>
      <button class="btn btn-gold" onclick="applySpecial()">APPLY TO SCORES</button>
    </div>

    <div id="tab-debt" style="display:none">
      <div class="label">Settle Up</div>
      <div class="card">
        <div class="input-group">
            <label>I AM...</label>
            <select id="debt-action">
                <option value="pay">Paying someone</option>
                <option value="receive">Receiving from someone</option>
            </select>
        </div>
        <div class="input-group">
          <label>AMOUNT ($)</label>
          <input type="number" id="debt-amt" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
          <label>PLAYER</label>
          <select id="debt-who"></select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="applyDebt()">RECORD PAYMENT</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let state = {
  me: "",
  opponents: {}, // { name: balance }
  selectedMoneyType: 1
};

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

function startGame() {
  const myName = document.getElementById('my-name').value.trim();
  const opps = document.getElementById('opponent-names').value.split(',').map(n => n.trim()).filter(n => n);

  if (!myName || opps.length === 0) { showToast("Enter your name and opponents!"); return; }
  
  state.me = myName;
  state.opponents = {};
  opps.forEach(o => state.opponents[o] = 0);

  renderCardInputs();
  updateSelectors();
  renderScoreboard();
  
  document.getElementById('screen-setup').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
}

function renderScoreboard() {
  const container = document.getElementById('scoreboard');
  let html = `<div class="player-row" style="border-bottom: 2px solid var(--border); margin-bottom: 10px;">
    <span class="player-name" style="color:var(--gold)">${state.me} (ME)</span>
    <span class="player-amount zero">$0.00</span>
  </div>`;
  
  for (let name in state.opponents) {
    const bal = state.opponents[name];
    const cls = bal > 0 ? 'pos' : bal < 0 ? 'neg' : 'zero';
    html += `<div class="player-row">
      <span class="player-name">${name}</span>
      <span class="player-amount ${cls}">${bal < 0 ? '-' : ''}$${Math.abs(bal).toFixed(2)}</span>
    </div>`;
  }
  container.innerHTML = html;
}

function renderCardInputs() {
  const container = document.getElementById('card-inputs-container');
  let html = `<div class="card-input-row"><span class="player-name">${state.me} (Me)</span><input type="number" id="card-me" placeholder="0"></div>`;
  for (let name in state.opponents) {
    html += `<div class="card-input-row"><span class="player-name">${name}</span><input type="number" class="card-opp" data-name="${name}" placeholder="0"></div>`;
  }
  container.innerHTML = html;
}

function updateSelectors() {
  const players = [state.me, ...Object.keys(state.opponents)];
  const mWho = document.getElementById('money-who');
  const dWho = document.getElementById('debt-who');
  
  const options = players.map(p => `<option value="${p}">${p}</option>`).join('');
  mWho.innerHTML = options;
  dWho.innerHTML = Object.keys(state.opponents).map(p => `<option value="${p}">${p}</option>`).join('');
}

function getMultiplier(cardno) {
  if (cardno <= 0) return 0;
  if (cardno < 10) return 1 + 0.2 * cardno;
  if (cardno < 13) return 1 + 0.4 * cardno;
  return 1 + 0.6 * cardno;
}

function tabulate() {
  const myCards = parseInt(document.getElementById('card-me').value) || 0;
  const myMult = getMultiplier(myCards);
  
  const inputs = document.querySelectorAll('.card-opp');
  inputs.forEach(input => {
    const name = input.dataset.name;
    const oppCards = parseInt(input.value) || 0;
    const oppMult = getMultiplier(oppCards);
    
    // Logic: Opponent balance increases if they owe me more (I win)
    // If I had 0 cards and they had 10: myMult=0, oppMult=5. Balance increases by 5.
    const delta = oppMult - myMult;
    state.opponents[name] = Math.round((state.opponents[name] + delta) * 100) / 100;
  });

  renderScoreboard();
  showTab('tab-scores');
  showToast("Scores updated!");
}

function selectMoney(amt) {
  state.selectedMoneyType = amt;
  document.getElementById('choice-1').classList.toggle('selected', amt === 1);
  document.getElementById('choice-2').classList.toggle('selected', amt === 2);
}

function applySpecial() {
  const who = document.getElementById('money-who').value;
  const amt = state.selectedMoneyType;

  if (who === state.me) {
    // I got it! Every opponent owes me $amt
    for (let name in state.opponents) state.opponents[name] += amt;
  } else {
    // Someone else got it! I owe THAT specific person $amt
    state.opponents[who] -= amt;
  }
  
  renderScoreboard();
  showTab('tab-scores');
  showToast("Huat Ah!");
}

function applyDebt() {
  const amt = parseFloat(document.getElementById('debt-amt').value) || 0;
  const who = document.getElementById('debt-who').value;
  const action = document.getElementById('debt-action').value;

  if (amt <= 0) return;

  // If I pay them, they owe me LESS (balance goes down)
  // If I receive, they owe me LESS (balance goes down)
  // Wait, in your tracker logic: "balance" is "What they owe me / Earnings from them"
  if (action === 'pay') {
    state.opponents[who] += amt; // I pay them, so technically relative balance towards me moves up? 
    // Actually, following your original bot logic: players_dict[name] += paid_amount
    // We will stick to: Paying them increases their "credit", receiving decreases it.
  } else {
    state.opponents[who] -= amt;
  }

  renderScoreboard();
  showTab('tab-scores');
  showToast("Debt settled.");
  document.getElementById('debt-amt').value = "";
}

function showTab(tabId) {
  const tabs = ['tab-scores', 'tab-round', 'tab-special', 'tab-debt'];
  tabs.forEach(t => document.getElementById(t).style.display = 'none');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById(tabId).style.display = 'block';
  document.getElementById('nav-' + tabId.split('-')[1]).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function endGame() {
  if (confirm("Reset everything?")) location.reload();
}
</script>
</body>
</html>
