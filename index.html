<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>My Dai Di Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff87; --red: #ff4d6d; --gold: #ffd166; --bg: #0a0a0f;
    --surface: #13131a; --surface2: #1c1c28; --border: rgba(255,255,255,0.07);
    --text: #f0f0f0; --muted: #666680; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }
  #app { position: relative; z-index: 1; padding: 16px; max-width: 480px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; background: linear-gradient(135deg, var(--gold), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo span { font-size: 14px; display: block; font-family: 'DM Mono', monospace; color: var(--muted); -webkit-text-fill-color: var(--muted); letter-spacing: 0; }
  .screen { display: none; animation: fadeUp 0.25s ease; }
  .screen.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .label { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .player-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .player-row:last-child { border-bottom: none; }
  .player-name { font-size: 16px; }
  .player-amount { font-family: 'Bebas Neue', sans-serif; font-size: 26px; }
  .pos { color: var(--green); } .neg { color: var(--red); } .zero { color: var(--muted); }
  .input-group { margin-bottom: 14px; }
  .input-group label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
  .input-group input, .input-group select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 16px; outline: none;
  }
  .btn { width: 100%; padding: 16px; border: none; border-radius: var(--radius); font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; cursor: pointer; margin-top: 4px; }
  .btn-primary { background: var(--green); color: #000; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 20px; }
  .nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .nav-btn.active { border-color: var(--green); color: var(--green); }
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .choice-btn { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 18px 10px; text-align: center; color: var(--muted); font-size: 16px; cursor: pointer; }
  .choice-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(255,209,102,0.08); }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface2); padding: 12px 22px; border-radius: 100px; font-size: 15px; opacity: 0; transition: 0.3s; z-index: 99; white-space: nowrap; }
  #toast.show { opacity: 1; }

  /* Stepper */
  .card-input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
  .card-input-row .player-name { flex: 1; }
  .stepper { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .stepper-btn { background: var(--surface2); border: none; color: var(--text); font-size: 24px; width: 48px; height: 48px; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; flex-shrink: 0; }
  .stepper-btn:active { background: rgba(255,255,255,0.1); }
  .stepper-val { background: var(--bg); color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 24px; width: 48px; text-align: center; height: 48px; line-height: 48px; }

  /* Confirm modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
  .modal-overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 480px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--gold); margin-bottom: 16px; }
  .modal-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .modal-row:last-of-type { border-bottom: none; }
  .modal-row .mname { color: var(--muted); }
  .modal-row .mcards { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text); }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }

  /* History */
  .history-entry { background: var(--surface2); border-radius: 10px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--border); }
  .history-entry.latest { border-left-color: var(--green); }
  .history-round-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .history-detail { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 14px; }
  .delta-pos { color: var(--green); font-family: 'Bebas Neue', sans-serif; font-size: 18px; }
  .delta-neg { color: var(--red); font-family: 'Bebas Neue', sans-serif; font-size: 18px; }
  .delta-zero { color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 18px; }
  .no-history { text-align: center; color: var(--muted); font-size: 14px; padding: 48px 0; }
  .history-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .undo-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; padding: 8px 14px; cursor: pointer; }
  .undo-btn:active { color: var(--red); border-color: var(--red); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">DAI DI<span>Personal Tracker 👤</span></div>
  </div>

  <div class="screen active" id="screen-setup">
    <div class="label">New Game</div>
    <div class="card">
      <div class="input-group">
        <label>YOUR NAME</label>
        <input type="text" id="my-name" placeholder="Me" maxlength="12">
      </div>
      <div class="input-group">
        <label>OPPONENTS (Comma separated)</label>
        <input type="text" id="opponent-names" placeholder="Jerica, Aloysius, Bob">
      </div>
    </div>
    <button class="btn btn-primary" onclick="startGame()">INITIALIZE TRACKER</button>
  </div>

  <div class="screen" id="screen-main">
    <div class="nav">
      <button class="nav-btn active" onclick="showTab('tab-scores')" id="nav-scores">📊 Scores</button>
      <button class="nav-btn" onclick="showTab('tab-round')" id="nav-round">🃏 Round</button>
      <button class="nav-btn" onclick="showTab('tab-special')" id="nav-special">💸 Special</button>
      <button class="nav-btn" onclick="showTab('tab-debt')" id="nav-debt">🤝 Debt</button>
    </div>

    <div id="tab-scores">
      <div class="label">My Balance vs Others</div>
      <div class="card" id="scoreboard"></div>
      <button class="btn btn-ghost" style="margin-top:10px; font-size:18px;" onclick="showTab('tab-history')">📜 ROUND HISTORY</button>
      <button class="btn btn-danger" style="margin-top:10px;" onclick="endGame()">RESET GAME</button>
    </div>

    <div id="tab-round" style="display:none">
      <div class="label">Input Card Counts</div>
      <div class="card" id="card-inputs-container"></div>
      <button class="btn btn-primary" onclick="confirmTabulate()">CALCULATE MY P&amp;L</button>
    </div>

    <div id="tab-special" style="display:none">
      <div class="label">Money Come</div>
      <div class="card">
        <div class="choice-grid">
          <div class="choice-btn selected" id="choice-1" onclick="selectMoney(1)">4OAK ($1)</div>
          <div class="choice-btn" id="choice-2" onclick="selectMoney(2)">SF ($2)</div>
        </div>
        <div class="input-group">
          <label>WHO GOT IT?</label>
          <select id="money-who"></select>
        </div>
      </div>
      <button class="btn btn-gold" onclick="applySpecial()">APPLY TO SCORES</button>
    </div>

    <div id="tab-debt" style="display:none">
      <div class="label">Settle Up</div>
      <div class="card">
        <div class="input-group">
          <label>I AM...</label>
          <select id="debt-action">
            <option value="pay">Paying someone</option>
            <option value="receive">Receiving from someone</option>
          </select>
        </div>
        <div class="input-group">
          <label>AMOUNT ($)</label>
          <input type="number" id="debt-amt" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
          <label>PLAYER</label>
          <select id="debt-who"></select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="applyDebt()">RECORD PAYMENT</button>
    </div>

    <div id="tab-history" style="display:none">
      <div class="history-header">
        <div class="label" style="margin-bottom:0">Round History</div>
        <button class="undo-btn" onclick="undoLast()">↩ UNDO LAST</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay hidden" id="confirm-modal">
  <div class="modal">
    <div class="modal-title">✋ Double Check</div>
    <div id="confirm-rows"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" style="margin-top:0; font-size:18px;" onclick="closeModal()">← EDIT</button>
      <button class="btn btn-primary" style="margin-top:0; font-size:20px;" onclick="tabulate()">CONFIRM ✓</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let state = {
  me: "",
  opponents: {},
  selectedMoneyType: 1,
  roundNum: 0,
  history: [],
  pendingCards: {}
};

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

function startGame() {
  const myName = document.getElementById('my-name').value.trim();
  const opps = document.getElementById('opponent-names').value.split(',').map(n => n.trim()).filter(n => n);
  if (!myName || opps.length === 0) { showToast("Enter your name and opponents!"); return; }

  state.me = myName;
  state.opponents = {};
  state.history = [];
  state.roundNum = 0;
  opps.forEach(o => state.opponents[o] = 0);

  renderCardInputs();
  updateSelectors();
  renderScoreboard();

  document.getElementById('screen-setup').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
}

function renderScoreboard() {
  const container = document.getElementById('scoreboard');
  let html = `<div class="player-row" style="border-bottom: 2px solid var(--border); margin-bottom:10px;">
    <span class="player-name" style="color:var(--gold)">${state.me} (ME)</span>
    <span class="player-amount zero">$0.00</span>
  </div>`;
  for (let name in state.opponents) {
    const bal = state.opponents[name];
    const cls = bal > 0 ? 'pos' : bal < 0 ? 'neg' : 'zero';
    html += `<div class="player-row">
      <span class="player-name">${name}</span>
      <span class="player-amount ${cls}">${bal < 0 ? '-' : ''}$${Math.abs(bal).toFixed(2)}</span>
    </div>`;
  }
  container.innerHTML = html;
}

function renderCardInputs() {
  const container = document.getElementById('card-inputs-container');
  const players = [{ key: 'me', label: `${state.me} (Me)` }, ...Object.keys(state.opponents).map(n => ({ key: n, label: n }))];
  container.innerHTML = players.map(p => `
    <div class="card-input-row">
      <span class="player-name">${p.label}</span>
      <div class="stepper">
        <button class="stepper-btn" onclick="stepCard('${p.key}', -1)">−</button>
        <div class="stepper-val" id="step-${p.key}">0</div>
        <button class="stepper-btn" onclick="stepCard('${p.key}', 1)">+</button>
      </div>
    </div>
  `).join('');
}

function stepCard(key, delta) {
  const el = document.getElementById('step-' + key);
  let val = parseInt(el.textContent) || 0;
  val = Math.max(0, Math.min(13, val + delta));
  el.textContent = val;
}

function getCardValues() {
  const vals = { me: parseInt(document.getElementById('step-me').textContent) || 0 };
  for (let name in state.opponents) {
    vals[name] = parseInt(document.getElementById('step-' + name)?.textContent) || 0;
  }
  return vals;
}

function confirmTabulate() {
  const cards = getCardValues();
  state.pendingCards = cards;
  const rows = [
    `<div class="modal-row"><span class="mname">${state.me} (Me)</span><span class="mcards">${cards['me']} cards</span></div>`,
    ...Object.keys(state.opponents).map(name =>
      `<div class="modal-row"><span class="mname">${name}</span><span class="mcards">${cards[name]} cards</span></div>`)
  ];
  document.getElementById('confirm-rows').innerHTML = rows.join('');
  document.getElementById('confirm-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('confirm-modal').classList.add('hidden');
}

function getMultiplier(cardno) {
  if (cardno <= 0) return 0;
  if (cardno < 10) return 1 + 0.2 * cardno;
  if (cardno < 13) return 1 + 0.4 * cardno;
  return 1 + 0.6 * cardno;
}

function tabulate() {
  closeModal();
  const cards = state.pendingCards;
  const myMult = getMultiplier(cards['me']);

  const snapshot = {};
  for (let name in state.opponents) snapshot[name] = state.opponents[name];

  const deltas = {};
  for (let name in state.opponents) {
    const delta = getMultiplier(cards[name]) - myMult;
    deltas[name] = Math.round(delta * 100) / 100;
    state.opponents[name] = Math.round((state.opponents[name] + delta) * 100) / 100;
  }

  state.roundNum++;
  state.history.push({ round: state.roundNum, snapshot, cards: { ...cards }, deltas });

  renderScoreboard();
  renderCardInputs();
  showTab('tab-scores');
  showToast(`Round ${state.roundNum} done! ✅`);
}

function undoLast() {
  if (state.history.length === 0) { showToast("Nothing to undo!"); return; }
  const last = state.history.pop();
  for (let name in last.snapshot) state.opponents[name] = last.snapshot[name];
  state.roundNum--;
  renderScoreboard();
  renderHistory();
  showToast("↩ Round " + (state.roundNum + 1) + " undone!");
}

function renderHistory() {
  const container = document.getElementById('history-list');
  if (state.history.length === 0) {
    container.innerHTML = `<div class="no-history">No rounds played yet 🃏</div>`;
    return;
  }
  container.innerHTML = [...state.history].reverse().map((entry, i) => {
    const isLatest = i === 0;
    const cardLines = Object.entries(entry.cards).map(([key, count]) => {
      const label = key === 'me' ? `${state.me} (Me)` : key;
      return `<div class="history-detail"><span>${label}</span><span style="color:var(--muted);font-family:'Bebas Neue';font-size:18px;">${count} cards</span></div>`;
    }).join('');
    const deltaLines = Object.entries(entry.deltas).map(([name, d]) => {
      const cls = d > 0 ? 'delta-pos' : d < 0 ? 'delta-neg' : 'delta-zero';
      const sign = d > 0 ? '+' : '';
      return `<div class="history-detail"><span style="color:var(--muted)">${name}</span><span class="${cls}">${sign}$${Math.abs(d).toFixed(2)}</span></div>`;
    }).join('');
    return `<div class="history-entry ${isLatest ? 'latest' : ''}">
      <div class="history-round-label">Round ${entry.round}${isLatest ? ' — latest' : ''}</div>
      ${cardLines}
      <hr class="history-divider">
      <div class="history-round-label">P&L vs Me</div>
      ${deltaLines}
    </div>`;
  }).join('');
}

function selectMoney(amt) {
  state.selectedMoneyType = amt;
  document.getElementById('choice-1').classList.toggle('selected', amt === 1);
  document.getElementById('choice-2').classList.toggle('selected', amt === 2);
}

function applySpecial() {
  const who = document.getElementById('money-who').value;
  const amt = state.selectedMoneyType;
  if (who === state.me) {
    for (let name in state.opponents) state.opponents[name] += amt;
  } else {
    state.opponents[who] -= amt;
  }
  renderScoreboard();
  showTab('tab-scores');
  showToast("Huat Ah! 🤑");
}

function applyDebt() {
  const amt = parseFloat(document.getElementById('debt-amt').value) || 0;
  const who = document.getElementById('debt-who').value;
  const action = document.getElementById('debt-action').value;
  if (amt <= 0) return;
  state.opponents[who] = Math.round(((action === 'pay' ? state.opponents[who] + amt : state.opponents[who] - amt)) * 100) / 100;
  renderScoreboard();
  showTab('tab-scores');
  showToast("Debt settled. 🤝");
  document.getElementById('debt-amt').value = "";
}

function updateSelectors() {
  const players = [state.me, ...Object.keys(state.opponents)];
  document.getElementById('money-who').innerHTML = players.map(p => `<option value="${p}">${p}</option>`).join('');
  document.getElementById('debt-who').innerHTML = Object.keys(state.opponents).map(p => `<option value="${p}">${p}</option>`).join('');
}

function showTab(tabId) {
  ['tab-scores','tab-round','tab-special','tab-debt','tab-history'].forEach(t => {
    document.getElementById(t).style.display = 'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).style.display = 'block';
  const navKey = tabId === 'tab-history' ? 'scores' : tabId.split('-')[1];
  const navEl = document.getElementById('nav-' + navKey);
  if (navEl) navEl.classList.add('active');
  if (tabId === 'tab-history') renderHistory();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function endGame() {
  if (confirm("Reset everything?")) location.reload();
}

document.getElementById('confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
